polling:
  intervalMinutes: 3
  jitterSeconds: 30

scan:
  # Only process jobs created within this many hours (avoids huge backlog).
  lookbackHours: 24
  # Safety cap: never process more than this many candidate jobs per tick.
  maxCandidatesPerTick: 25       # reduced from 50 so worst-case tick stays under watchdog timeout
  detailPageDelayMs: 1500        # courtesy delay between opening job detail pages (rate-limit safety)
  processedJobRetainHours: 96    # prune processed-job records older than this (state.json bound)
  fullRecheckCooldownMinutes: 30 # a FULL job that re-opens to nothing assignable (e.g. rows in WAITING_REVIEW) is skipped this long before re-checking

browser:
  headless: true
  viewport: { width: 1920, height: 1080 }
  navigationTimeoutMs: 30000

storage:
  statePath: ./data/state.json
  logsDir: ./logs
  cookiesPath: ./data/cookies.json

assignment:
  # Safety default: dry-run is ON. Flip to false ONLY after verifying selectors
  # against the real TMS DOM (see plan Task 18) and confirming dry-run logs are correct.
  dryRun: true
  maxRetries: 3
  retryDelayMs: 5000
  maxPartialRetries: 5      # give up + alert after this many PARTIAL retries on a job

logging:
  level: info
  rotateDays: 14
  screenshotRetainDays: 7        # delete error screenshots older than this
  screenshotMaxPerDay: 200    # hard cap on error screenshots per day (disk-burst guard)

reliability:
  watchdog:
    # Hard hang-detector: if a tick doesn't settle within this, the process
    # hard-exits for the service to restart. The tick ALSO enforces a soft work
    # budget (70% of this value): once exceeded it stops opening NEW candidates
    # and defers the rest to the next tick, so a slow-but-progressing tick (TMS
    # latency / retry storm) is never hard-killed mid-work. Worst-case derivation
    # for the headroom: maxCandidatesPerTick(25) is bounded by the 70% budget
    # (~14 min), leaving ~6 min for one in-flight job's retries
    # (maxRetries 3 × exponential backoff 5+10+20s ≈ 35s per language + Ant waits)
    # to finish before the hard kill.
    tickTimeoutMs: 1200000       # 20 min
  reauth:
    alertOnExpiry: true
    # Auto-renew the TMS access token via the stored refresh_token (no manual
    # capture-cookies) — proactively near expiry and on-expiry after a restart.
    # Set false to revert to warn-and-pause. Default true.
    autoRenew: true
    # Refresh once the access token is within this many minutes of expiry
    # (token lives ~12h). Default 120. Keep this comfortably ABOVE 90 (the
    # pre-expiry warning window) so auto-renew fires before the warning — a lower
    # value makes the bot warn "session expiring, run capture-cookies" before it
    # has even tried to renew.
    refreshThresholdMin: 120
  monitoring:
    dailySummaryTime: "09:00"    # local time
    consecutiveErrorAlert: 3     # consecutive failing ticks before alerting
  browserRecycleHours: 24        # proactively restart the browser this often (memory hygiene)
  consecutiveZeroScanAlert: 5    # alert if scan returns 0 candidates this many ticks in a row (selector drift)

sheets:
  # Mirror real (non-dry-run) assignments into a Google Sheet. Disabled by
  # default. The credentials file is a service-account key (gitignored); the
  # spreadsheet must be shared with that service account as Editor.
  enabled: false
  spreadsheetId: "1Y1cua4PwwZaDdxOiZVbWK-YOsxvM9f1OMD2JHD46zC4"
  credentialsPath: ./google-credentials.json
  tabs:
    lo-LA: "Lao Assign"     # lo-LA assignments are written here
    km-KH: "Khmer Assign"   # km-KH assignments are written here

review:
  # Assign a fixed reviewer to lo-LA rows in WAITING_REVIEW (after translation is
  # done). Disabled by default. Only languages listed here get a reviewer; others
  # are skipped. Dry-run gates this exactly like translator assignment.
  enabled: false
  # A SECOND scan pass finds jobs that reached WAITING_REVIEW after they aged out
  # of scan.lookbackHours (reviews start days after a job is created). This is its
  # own Created window, decoupled from the translation window. Default 168h (7d).
  scanLookbackHours: 168
  # Separate per-tick cap for review-pass detail opens (newest reviews first —
  # recently-translated jobs that actually need review), so review work is never
  # starved by a translation burst. Default 10.
  maxCandidatesPerTick: 10
  reviewers:
    lo-LA: "LO_T2@eqho.com"
