polling:
  intervalMinutes: 3
  jitterSeconds: 30

scan:
  # Only process jobs created within this many hours (avoids huge backlog).
  lookbackHours: 48
  # Safety cap: never process more than this many candidate jobs per tick.
  maxCandidatesPerTick: 25       # reduced from 50 so worst-case tick stays under watchdog timeout
  detailPageDelayMs: 1500        # courtesy delay between opening job detail pages (rate-limit safety)
  processedJobRetainHours: 96    # prune processed-job records older than this (state.json bound)

browser:
  headless: true
  viewport: { width: 1920, height: 1080 }
  navigationTimeoutMs: 30000

storage:
  statePath: ./data/state.json
  logsDir: ./logs
  cookiesPath: ./data/cookies.json

assignment:
  # Safety default: dry-run is ON. Flip to false ONLY after verifying selectors
  # against the real TMS DOM (see plan Task 18) and confirming dry-run logs are correct.
  dryRun: true
  maxRetries: 3
  retryDelayMs: 5000
  maxPartialRetries: 5      # give up + alert after this many PARTIAL retries on a job

logging:
  level: info
  rotateDays: 14
  screenshotRetainDays: 7        # delete error screenshots older than this
  screenshotMaxPerDay: 200    # hard cap on error screenshots per day (disk-burst guard)

reliability:
  watchdog:
    tickTimeoutMs: 900000        # 15 min — headroom for worst-case real-assign tick (25 jobs) + retries
  reauth:
    alertOnExpiry: true
  monitoring:
    dailySummaryTime: "09:00"    # local time
    consecutiveErrorAlert: 3     # consecutive failing ticks before alerting
  browserRecycleHours: 24        # proactively restart the browser this often (memory hygiene)
  consecutiveZeroScanAlert: 5    # alert if scan returns 0 candidates this many ticks in a row (selector drift)
