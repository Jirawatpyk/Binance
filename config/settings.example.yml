polling:
  intervalMinutes: 5
  jitterSeconds: 30

scan:
  # Only process jobs created within this many hours (avoids huge backlog).
  lookbackHours: 48
  # Safety cap: never process more than this many candidate jobs per tick.
  maxCandidatesPerTick: 50

browser:
  headless: true
  viewport: { width: 1920, height: 1080 }
  navigationTimeoutMs: 30000

storage:
  statePath: ./data/state.json
  logsDir: ./logs
  cookiesPath: ./data/cookies.json

assignment:
  # Safety default: dry-run is ON. Flip to false ONLY after verifying selectors
  # against the real TMS DOM (see plan Task 18) and confirming dry-run logs are correct.
  dryRun: true
  maxRetries: 3
  retryDelayMs: 5000

logging:
  level: info
  rotateDays: 14
